<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recruiter Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container py-5">

<div class="hero">

<h1>👥 Recruiter Dashboard</h1>

<p>

Upload Multiple Resumes and Rank Candidates Automatically

</p>

</div>

<div class="upload-card">

<form action="/rank" method="POST" enctype="multipart/form-data">

<div class="mb-4">

<label class="form-label fw-bold">

Job Description

</label>

<textarea

class="form-control"

name="job_description"

rows="8"

placeholder="Paste Complete Job Description..."

required></textarea>

</div>

<div class="mb-4">

<label class="form-label fw-bold">

Upload Multiple Resume (PDF)

</label>

<input

type="file"

class="form-control"

name="resumes"

accept=".pdf"

multiple

required>

<small class="text-muted">

Hold <b>Ctrl</b> to select multiple resumes.

</small>

</div>

<div class="d-grid">

<button class="btn btn-success btn-lg">

🏆 Analyze Candidates

</button>

</div>

</form>

<hr>

<div class="text-center">

<a href="/" class="btn btn-primary">

← Back To Single Resume

</a>

</div>

</div>

</div>

</body>

</html>
